pipeline {
    agent any // Définit l'environnement de travail pour tout le pipeline

    environment {
        // Vérifie bien que l'ID dans Jenkins est identique à celui-ci
        DOCKERHUB_CREDENTIALS = credentials('dockerhub-credentials-id')
        DOCKER_IMAGE = 'edmr/flask-app:latest'
        GITHUB_REPO = 'https://github.com/edm-r/flask_app.git'
    }

    stages {
        stage('Clonage') {
            steps {
                echo 'Récupération du code source...'
                git branch: 'main', url: "${GITHUB_REPO}"
            }
        }
        
        stage('Image') {
            steps {
                echo 'Construction de l\'image Docker...'
                sh 'docker build -t $DOCKER_IMAGE .'
            }
        }
        
        stage('Publication') {
            steps {
                echo 'Connexion et envoi vers DockerHub...'
                // Utilise les variables d'environnement générées par 'credentials'
                sh "echo \$DOCKERHUB_CREDENTIALS_PSW | docker login -u \$DOCKERHUB_CREDENTIALS_USR --password-stdin"
                sh "docker push $DOCKER_IMAGE"
            }
        }
    }
    
    post {
        always {
            echo 'Nettoyage de la session Docker...'
            sh 'docker logout'
        }
    }
}